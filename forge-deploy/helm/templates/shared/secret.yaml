{{/*
Auto-generated Secret for inline credentials. Each key is only emitted when
the corresponding *externalSecretName* / *ExistingSecret* is empty —— customers
who manage secrets externally (Vault, ESO, etc.) can skip this file entirely.
*/}}
{{- $needDb       := not .Values.database.externalSecretName -}}
{{- $needCache    := not .Values.cache.externalSecretName -}}
{{- $needOs       := not .Values.objectStorage.externalSecretName -}}
{{- $needSigning  := not .Values.signing.masterPassphraseExistingSecret -}}
{{- $needAuth     := not .Values.auth.sessionSecretExistingSecret -}}
{{- if or $needDb $needCache $needOs $needSigning $needAuth }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "forge.secretName" . }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $needDb }}
  DATABASE_PASSWORD: {{ .Values.database.password | quote }}
  {{- end }}
  {{- if $needCache }}
  CACHE_PASSWORD: {{ .Values.cache.password | quote }}
  {{- end }}
  {{- if $needOs }}
  {{- $creds := splitList "|" (include "forge.objectStorage.credentials" .) }}
  OBJECT_STORAGE_ACCESS_KEY_ID: {{ index $creds 0 | quote }}
  OBJECT_STORAGE_ACCESS_KEY_SECRET: {{ index $creds 1 | quote }}
  {{- end }}
  {{- if $needSigning }}
  KEY_MASTER_PASSPHRASE: {{ .Values.global.keyMasterPassphrase | quote }}
  {{- end }}
  {{- if $needAuth }}
  AUTH_SESSION_SECRET: {{ .Values.global.sessionSecret | quote }}
  BOOTSTRAP_ADMIN_USERNAME: {{ .Values.auth.bootstrapAdmin.username | quote }}
  BOOTSTRAP_ADMIN_EMAIL: {{ .Values.auth.bootstrapAdmin.email | quote }}
  BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.auth.bootstrapAdmin.password | quote }}
  {{- end }}
{{- end }}
