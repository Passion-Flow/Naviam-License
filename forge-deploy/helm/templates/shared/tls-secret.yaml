{{/*
TLS Secret —— 仅在 .Values.ingress.tls.cert / key 直接提供证书内容时渲染。
推荐做法仍然是客户自己用 cert-manager / Vault Agent 注入 secretName 对应的 Secret，
此模板只是兜底（自签名 / air-gapped 集群无 cert-manager 时用）。
*/}}
{{- if and .Values.ingress.tls.enabled .Values.ingress.tls.cert .Values.ingress.tls.key }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ingress.tls.secretName | quote }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.ingress.tls.cert | b64enc | quote }}
  tls.key: {{ .Values.ingress.tls.key | b64enc | quote }}
{{- end }}
