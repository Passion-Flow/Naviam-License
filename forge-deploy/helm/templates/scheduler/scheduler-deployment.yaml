{{- if .Values.scheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forge.componentName" (dict "root" . "component" "scheduler") }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
  annotations:
    # ⚠️ Celery beat MUST run as a singleton — multiple replicas would fire every periodic task N times.
    forge.io/singleton: "true"
spec:
  # Singleton — `replicas` is intentionally not configurable from values.yaml.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "forge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        {{- include "forge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scheduler
        {{- include "forge.podExtraLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/shared/config.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/shared/secret.yaml") . | sha256sum }}
    spec:
      {{- if .Values.scheduler.serviceAccountName }}
      serviceAccountName: {{ .Values.scheduler.serviceAccountName }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduler.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduler.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduler.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (include "forge.podSecurityContext" .) }}
      securityContext:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: scheduler
          image: {{ include "forge.image" (dict "root" . "component" "scheduler") }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- with (include "forge.containerSecurityContext" .) }}
          securityContext:
            {{- . | nindent 12 }}
          {{- end }}
          env:
            {{- include "forge.appEnv" . | nindent 12 }}
            {{- with .Values.scheduler.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
{{- end }}
