{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forge.componentName" (dict "root" . "component" "api") }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "forge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "forge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        {{- include "forge.podExtraLabels" . | nindent 8 }}
      annotations:
        # Re-roll pods when shared config / secret content changes
        checksum/config: {{ include (print $.Template.BasePath "/shared/config.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/shared/secret.yaml") . | sha256sum }}
    spec:
      {{- if .Values.api.serviceAccountName }}
      serviceAccountName: {{ .Values.api.serviceAccountName }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (include "forge.podSecurityContext" .) }}
      securityContext:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "forge.image" (dict "root" . "component" "api") }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- with (include "forge.containerSecurityContext" .) }}
          securityContext:
            {{- . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 13001
          env:
            {{- include "forge.appEnv" . | nindent 12 }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
