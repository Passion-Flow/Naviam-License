# Forge — Redis 配置
# 与全局 03-Services/cache.md 硬性要求一致：AOF + RDB 同开

bind 0.0.0.0
port 6379
protected-mode yes

# 凭证
requirepass Redis@!QAZxsw2.

# 内存
maxmemory 512mb
maxmemory-policy allkeys-lru

# 持久化：AOF + RDB
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# 日志
loglevel notice
logfile ""

# 禁用危险命令（与 cache.md 一致）
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command KEYS     ""
rename-command CONFIG   ""
