# Forge — Postgres 主配置（开发环境）
# 客户私有化部署可改为客户自有 postgresql.conf；本文件为合理默认。

listen_addresses = '*'
port = 5432
max_connections = 100

# 内存（开发机；生产由客户调整）
shared_buffers = 256MB
work_mem = 16MB
maintenance_work_mem = 64MB

# WAL
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_timeout = 5min

# 日志
log_destination = 'stderr'
log_min_duration_statement = 200   # 慢查询阈值 200ms（与 03-Services/database.md 一致）
log_statement = 'none'             # 不打全部 SQL，避免日志爆 + PII 泄露
log_timezone = 'UTC'

# 区域
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'

# 客户端
default_text_search_config = 'pg_catalog.english'

# 隔离级别（与全局 03-Services/database.md 一致：Read Committed）
default_transaction_isolation = 'read committed'
