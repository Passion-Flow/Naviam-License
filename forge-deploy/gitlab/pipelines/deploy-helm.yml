# ------------------------------------------------------------------
# stage: deploy (mode: helm)
# Deploy via `helm upgrade --install`. Customer sets:
#   DEPLOY_MODE=helm, KUBECONFIG (file variable), HELM_VALUES_FILE,
#   HELM_RELEASE, HELM_NAMESPACE.
# Production deploy is manual.
# ------------------------------------------------------------------

.deploy-helm-base:
  stage: deploy
  image: $HELM_IMAGE
  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    - export KUBECONFIG="$KUBECONFIG"
  rules:
    - if: '$DEPLOY_MODE == "helm" && $CI_COMMIT_BRANCH == "main"'

.helm-upgrade-args: &helm-upgrade-args >-
  helm upgrade --install "$HELM_RELEASE" forge-deploy/helm/
  --namespace "$HELM_NAMESPACE" --create-namespace
  -f "$HELM_VALUES_FILE"
  --set imageRegistry=$IMAGE_REGISTRY
  --set api.image.tag=$IMAGE_TAG
  --set worker.image.tag=$IMAGE_TAG
  --set scheduler.image.tag=$IMAGE_TAG
  --set web.image.tag=$IMAGE_TAG
  --atomic
  --timeout 10m

deploy:helm-staging:
  extends: .deploy-helm-base
  environment:
    name: staging-helm
  script:
    - *helm-upgrade-args

deploy:helm-prod:
  extends: .deploy-helm-base
  environment:
    name: prod-helm
  when: manual
  script:
    - *helm-upgrade-args
