# Redis 7 — License Console（V1 安全基线）

# 网络
bind 0.0.0.0
protected-mode yes
port 6379
tcp-keepalive 60
timeout 0

# 认证：requirepass 由 docker-compose 通过命令行注入

# 危险命令重命名为空 = 禁用
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command KEYS ""
rename-command CONFIG ""
rename-command DEBUG ""
rename-command SHUTDOWN ""

# 持久化
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

save 900 1
save 300 10
save 60 10000

# 内存
maxmemory 384mb
maxmemory-policy allkeys-lru

# 日志
loglevel notice
logfile ""

# 慢日志
slowlog-log-slower-than 10000
slowlog-max-len 128
