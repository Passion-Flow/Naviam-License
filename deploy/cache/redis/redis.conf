# Redis 7 — License Console（V1 安全基线）
#
# 命名规范：默认连接走 default 用户 + requirepass；REDIS_USERNAME=naviam_license 是
# 给 V2 ACL 改造预留 — V2 实施时由 entrypoint 用 redis-cli ACL SETUSER 创建命名用户。
# V1 的 client (Django) 当前用空 username + 密码连接 default 用户。

# === 网络 ===
# protected-mode + 仅监听容器网络（docker-compose 把 6379 仅暴露到 127.0.0.1）
bind 0.0.0.0
protected-mode yes
port 6379
tcp-keepalive 60
timeout 0

# === 认证 ===
# requirepass 由 docker-compose --requirepass 命令行注入，不写在文件里（避免镜像层泄露）

# === 危险命令 — 重命名为空 = 禁用 ===
# 任何攻击者拿到 Redis 也无法 FLUSH / KEYS * 全表扫描 / CONFIG SET 提权
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command KEYS ""
rename-command CONFIG ""
rename-command DEBUG ""
rename-command SHUTDOWN ""
rename-command SCRIPT ""
rename-command EVAL ""
rename-command EVALSHA ""

# === 持久化 ===
# AOF + RDB 双保险；License 系统的 session/cache 即使丢失影响小，但限速桶丢失
# 会让攻击窗口短暂打开，所以仍打开 AOF
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

save 900 1
save 300 10
save 60 10000

# === 内存 ===
maxmemory 384mb
maxmemory-policy allkeys-lru

# === 日志 ===
loglevel notice
logfile ""

# 慢日志
slowlog-log-slower-than 10000
slowlog-max-len 128
