# Postgres 16 — License Console 配置（V1 安全基线）
# 引用：postgres -c config_file=/etc/postgresql/postgresql.conf
#
# 关键约束：
# - 仅监听内部网络；禁止公网。
# - 强制 SSL（容器外 TLS 终结由 OS 卷加密兜底；V1 同主机不强制 SSL）。
# - 日志：超过 200ms 的语句记录；DDL 全部记录。

listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 5

# 性能（保守）
shared_buffers = 512MB
effective_cache_size = 1536MB
work_mem = 16MB
maintenance_work_mem = 128MB
wal_buffers = 16MB

# WAL & 归档（V1 默认开启；归档到 ./data/archive，外部备份脚本搬走）
wal_level = replica
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/data/pgdata/archive/%f && cp %p /var/lib/postgresql/data/pgdata/archive/%f'
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# 日志
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_min_duration_statement = 200ms
log_statement = 'ddl'
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%m [%p] %q%u@%d '

# 时区
timezone = 'UTC'
log_timezone = 'UTC'

# 自动清理
autovacuum = on
autovacuum_max_workers = 3
