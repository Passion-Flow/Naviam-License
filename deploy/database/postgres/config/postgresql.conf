# Postgres 16 — License Console 配置（V1 安全基线）
# 引用：postgres -c config_file=/etc/postgresql/postgresql.conf
#
# 关键约束：
# - 仅监听内部网络；禁止公网（由 docker 端口映射 + pg_hba 双重隔离）。
# - 密码强制 scram-sha-256（pg_hba.conf）。
# - 日志：超过 200ms 的语句记录；DDL 全部记录。

# === 网络 ===
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 5

# === 性能（保守，给 2GB 内存容器） ===
shared_buffers = 512MB
effective_cache_size = 1536MB
work_mem = 16MB
maintenance_work_mem = 128MB
wal_buffers = 16MB

# === WAL ===
# V1 dev 默认关闭归档：archive 目录不存在时 archive_mode=on 会让 postgres 拒启动。
# 生产开归档时：先 mkdir -p data/archive，再把 archive_mode 改为 on。
wal_level = replica
archive_mode = off
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# 生产环境归档示例（解开注释 + 提前创建 archive 目录）：
# archive_mode = on
# archive_command = 'test ! -f /var/lib/postgresql/data/pgdata/archive/%f && cp %p /var/lib/postgresql/data/pgdata/archive/%f'

# === 日志 ===
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_min_duration_statement = 200ms
log_statement = 'ddl'
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%m [%p] %q%u@%d '

# 强制密码哈希算法（不允许明文比较）
password_encryption = 'scram-sha-256'

# === 时区 ===
timezone = 'UTC'
log_timezone = 'UTC'

# === 自动清理 ===
autovacuum = on
autovacuum_max_workers = 3
