# pg_hba.conf — License Console
# 仅允许容器网络与本机；密码使用 scram-sha-256。
# 命名规范：username = naviam_<project>，database = naviam_<project>

# TYPE  DATABASE        USER            ADDRESS                 METHOD
local   all             all                                     scram-sha-256
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# 容器内部网络（默认 docker 桥接 172.16.0.0/12）
host    naviam_license  naviam_license          172.16.0.0/12   scram-sha-256

# 只读账号（V2 引入审计/报表副本时启用）
# host    naviam_license  naviam_license_ro       172.16.0.0/12   scram-sha-256

# 复制流（V2 启用主从时启用）
# host    replication     naviam_license_repl     172.16.0.0/12   scram-sha-256

# 显式拒绝其他来源
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
