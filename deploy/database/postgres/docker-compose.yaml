version: "3.9"

# Postgres 16 — License Console 主数据库
# 仅监听内部网络；密码通过 .env 注入。
# 命名规范：username/db = naviam_<project>；password = <Service>@!QAZxsw2.

services:
  postgres:
    image: postgres:16-alpine
    container_name: license_postgres
    restart: unless-stopped
    environment:
      # postgres 官方镜像约定的变量名（左）：项目统一变量名（右）
      POSTGRES_DB: ${POSTGRES_DB:-naviam_license}
      POSTGRES_USER: ${POSTGRES_USERNAME:-naviam_license}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      # 仅本机回环；如需跨主机，改为 docker overlay 网络
      - "${POSTGRES_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-naviam_license} -d ${POSTGRES_DB:-naviam_license}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: false  # PGDATA 需要可写
    tmpfs:
      - /tmp
      - /run
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
